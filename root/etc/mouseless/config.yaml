baseMouseSpeed: 768.0
baseScrollSpeed: 32.0

mouseAccelerationTime: 384.0
mouseDecelerationTime: 192.0

layers:
  - name: initial
    bindings:
      tab: tap-hold-next tab ; toggle-layer mouse ; 300
  - name: mouse
    passThrough: true
    bindings:
      leftctrl: tap-hold-next leftctrl ; toggle-layer arrows ; 0
      leftshift: tap-hold-next leftshift ; toggle-layer wheel ; 0

      r: reload-config

      h: move -1  0
      j: move  0  1
      k: move  0 -1
      l: move  1  0

      y: scroll left
      u: scroll down
      i: scroll up
      o: scroll right

      space: speed 0.32

      f: button left
      d: button middle
      s: button right

      e: button left
      w: button middle
      q: button right

  - name: arrows
    bindings:
      h: left
      j: down
      k: up
      l: right

  - name: wheel
    bindings:
      h: scroll left
      j: scroll down
      k: scroll up
      l: scroll right
