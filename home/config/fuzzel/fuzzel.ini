[main]
dpi-aware      = yes
font           = CommitMono Nerd Font Mono:size=12:fontfeatures=cv04:fontfeatures=cv06:fontfeatures=cv07:fontfeatures=cv08
icons-enabled  = no
prompt         = ""
minimal-lines  = true
horizontal-pad = 0
inner-pad      = 0
vertical-pad   = 0
width          = 48
keyboard-focus = on-demand

[colors]
background      = 1e1e2eff
border          = 6c7086ff
counter         = 7f849cff
input           = cdd6f4ff
match           = f9e2afff
placeholder     = 7f849cff
prompt          = bac2deff
selection       = 313244ff
selection-match = f9e2afff
selection-text  = cdd6f4ff
text            = a6adc8ff

[border]
radius = 0
width  = 0
